name: Backend CI

on:
  push:
    paths:
      - 'Backend/**'
  pull_request:
    paths:
      - 'Backend/**'

jobs:
  test_and_verify:
    runs-on: ubuntu-latest
    
    # Spin up MongoDB container for tests
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    defaults:
      run:
        working-directory: ./Backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './Backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Backend Integration & Unit Tests
        run: npm test
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://127.0.0.1:27017/nexus-test
          JWT_SECRET: super_secret_testing_token_key_12345
          JWT_EXPIRE: 15m
          REFRESH_SECRET: super_secret_testing_refresh_key_12345
          REFRESH_EXPIRE: 7d
